services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      [
        "uvicorn",
        "repolens.main:app",
        "--app-dir",
        "/app/backend",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload"
      ]
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID:-}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hashing}
      VECTOR_STORE_PROVIDER: ${VECTOR_STORE_PROVIDER:-memory}
      ANSWER_PROVIDER: ${ANSWER_PROVIDER:-extractive}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./.data/repolens.db}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./.data:/app/.data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend-node-modules:

