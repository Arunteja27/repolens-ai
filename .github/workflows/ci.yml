name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e backend[dev]
      - name: Lint backend
        run: python -m ruff check --config backend/pyproject.toml backend
      - name: Typecheck backend
        run: python -m mypy --config-file backend/pyproject.toml backend/repolens
      - name: Test backend
        run: PYTHONPATH=backend python -m pytest backend/tests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        run: npm --prefix frontend install
      - name: Lint frontend
        run: npm --prefix frontend run lint
      - name: Typecheck frontend
        run: npm --prefix frontend run typecheck
      - name: Build frontend
        run: npm --prefix frontend run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile .
